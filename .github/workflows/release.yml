# Publishes packages and creates GitHub Releases via Changesets.
#
# On every push to master this opens (or updates) a "Version Packages" PR that
# applies pending changesets and bumps versions. When that PR is merged, this
# same workflow runs `npm run release` to publish to npm AND — because
# changesets/action defaults createGithubReleases to true — files a GitHub
# Release for each tag it pushes, which is what populates the "Releases" panel
# on the repo page.
#
# Requires an NPM_TOKEN repository secret with publish access. GITHUB_TOKEN is
# provided automatically and is what lets the action create Releases.
name: Release

on:
  push:
    branches:
      - master

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          # Changesets needs full history to compare tags and generate notes.
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '22'
          cache: npm
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Create Release Pull Request or Publish
        uses: changesets/action@v1
        with:
          # Matches the root package.json "release" script:
          #   turbo run build && changeset publish
          publish: npm run release
          version: npm run version-packages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
