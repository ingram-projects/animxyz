# Proactively catches upstream breakage: once a week, update every dependency
# to the newest version allowed by the semver ranges (ignoring the lockfile),
# rebuild the packages, and run the full test suite — Sass compile + snapshot
# tests and the cross-framework browser functional tests. A failure here means
# a dependency update would break AnimXYZ before any user hits it.
name: Dependency check

on:
  schedule:
    # Mondays at 09:00 UTC
    - cron: '0 9 * * 1'
  workflow_dispatch:

jobs:
  fresh-deps-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '22'

      - name: Install freshest in-range dependencies
        run: |
          npm install --no-audit --no-fund
          npm update --no-audit --no-fund

      - name: Report dependency drift from the lockfile
        run: git diff --stat package-lock.json || true

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Build and test everything
        run: npx turbo run test --force
